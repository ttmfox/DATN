spring:
  application:
    name: TiraShop
  config:
    import:
      - classpath:application-db.yml
      - classpath:application-jwt.yml
      - classpath:application-security.yml
      - classpath:application-email.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
logging:
  level:
    org:
      springframework:
        security: TRACE

chatbot:
  webhook:
    url: ${WEB_HOOK_URL}
    enabled: true

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  url: ${VNPAY_URL}
  return-url: ${VNPAY_RETURN_URL}
  api-url: ${VNPAY_API_URL}